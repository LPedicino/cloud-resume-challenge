<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Mi Cloud Resume</title>
</head>
<body class="bg-gray-100 text-gray-900">
    <main class="max-w-2xl mx-auto p-8 bg-white shadow-lg mt-10 rounded-lg">
        <h1 class="text-3xl font-bold mb-4">Tu Nombre</h1>
        <p class="text-gray-600 mb-6">Cloud Engineer aspirante | Especialista en AWS</p>
        
        <div class="border-t pt-6">
            <p class="text-sm text-gray-500">Visitantes:</p>
            <div id="counter" class="text-2xl font-mono font-bold text-blue-600">Cargando...</div>
        </div>
    </main>

    <script>
        // Aquí conectaremos la API cuando AWS nos deje
        fetch('TU_URL_DE_API_GATEWAY/contador')
            .then(response => response.json())
            .then(data => {
                document.getElementById('counter').innerText = data;
            })
            .catch(err => {
                document.getElementById('counter').innerText = "Error al cargar";
            });
    </script>
</body>
</html>
